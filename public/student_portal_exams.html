<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1A56A0;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        aside h1 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        /* Chart Card */
        .chart-container {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            height: 350px;
        }

        /* Stats Card */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: white;
            padding: 1.25rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-box h4 {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .stat-box .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Table Card */
        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .badge-score {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .score-success {
            background: #dcfce7;
            color: #166534;
        }

        .score-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .score-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            .stats-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <aside>
        <h1>AcademiaPro</h1>
        <nav id="mainNav">
            <a href="/student-portal">🏠 Mi Panel</a>
            <a href="/student-portal/exams" class="active">📝 Mis Notas</a>
            <a href="/student-portal/calendar">📅 Mi Calendario</a>
            <a href="/student-portal/payments">💳 Mis Pagos</a>
            <a href="/chat">💬 Chat</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="/auth/logout" style="color: var(--danger); text-decoration: none; font-weight: 600;">
                🚪 Cerrar Sesión
            </a>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2>Mis Notas</h2>
            <p style="color: var(--text-muted);">Sigue tu progreso académico.</p>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <h4>Nota Media Total</h4>
                <div id="avg-score" class="value">0.0</div>
            </div>
            <div class="stat-box">
                <h4>Total Exámenes</h4>
                <div id="total-exams" class="value">0</div>
            </div>
            <div class="stat-box">
                <h4>Última Nota</h4>
                <div id="last-score" class="value">-</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="evolutionChart"></canvas>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Asignatura</th>
                        <th>Calificación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="exams-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadExams() {
            try {
                const res = await fetch('/api/student/portal-data');
                const data = await res.json();
                const exams = data.exams.reverse(); // Chronological for chart

                if (exams.length > 0) {
                    document.getElementById('avg-score').textContent = data.stats.avgScore;
                    document.getElementById('total-exams').textContent = exams.length;
                    document.getElementById('last-score').textContent = exams[exams.length - 1].score;

                    renderChart(exams);
                    renderTable(data.exams); // Still descending for table
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderChart(exams) {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: exams.map(e => new Date(e.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })),
                    datasets: [{
                        label: 'Nota',
                        data: exams.map(e => e.score),
                        borderColor: '#1A56A0',
                        backgroundColor: 'rgba(26, 86, 160, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 6,
                        pointBackgroundColor: '#1A56A0'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { min: 0, max: 10, ticks: { stepSize: 1 } },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function renderTable(exams) {
            const tbody = document.getElementById('exams-table-body');
            tbody.innerHTML = exams.map(e => `
                <tr>
                    <td>${new Date(e.date).toLocaleDateString('es-ES')}</td>
                    <td>${e.subject}</td>
                    <td>
                        <span class="badge-score ${e.score >= 7 ? 'score-success' : e.score >= 5 ? 'score-warning' : 'score-danger'}">
                            ${e.score}
                        </span>
                    </td>
                    <td style="font-weight: 500; color: ${e.score >= 5 ? 'var(--success)' : 'var(--danger)'}">
                        ${e.score >= 5 ? 'Aprobado' : 'Suspenso'}
                    </td>
                </tr>
            `).join('');
        }

        loadExams();
    </script>
</body>

</html>
