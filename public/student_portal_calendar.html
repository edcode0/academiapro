<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root {
            --primary: #1A56A0;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        aside h1 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            height: calc(100vh - 200px);
        }

        /* Calendar Styling */
        .fc-header-toolbar {
            margin-bottom: 1.5rem !important;
        }

        .fc-button-primary {
            background-color: var(--primary) !important;
            border-color: var(--primary) !important;
        }

        .fc-event {
            cursor: pointer;
            padding: 2px 4px;
        }

        /* Modal Details */
        #sessionDetails {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            width: 400px;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal h3 {
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .detail-row {
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }

        .detail-row strong {
            color: var(--text-muted);
        }

        .notes-box {
            background: #f8fafc;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            main {
                margin-left: 0;
                padding: 10px;
            }

            .card {
                height: calc(100vh - 100px);
                padding: 5px;
            }
        }
    </style>
</head>

<body>
    <aside>
        <h1>AcademiaPro</h1>
        <nav id="mainNav">
            <a href="/student-portal">🏠 Mi Panel</a>
            <a href="/student-portal/exams">📝 Mis Notas</a>
            <a href="/student-portal/calendar" class="active">📅 Mi Calendario</a>
            <a href="/student-portal/payments">💳 Mis Pagos</a>
            <a href="/chat">💬 Chat</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="/auth/logout" style="color: var(--danger); text-decoration: none; font-weight: 600;">
                🚪 Cerrar Sesión
            </a>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2>Mi Calendario</h2>
            <p style="color: var(--text-muted);">Consulta tus próximas clases y sesiones pasadas.</p>
        </div>

        <div class="card">
            <div id="calendar"></div>
        </div>
    </main>

    <div id="sessionDetails">
        <div class="modal">
            <h3>Detalle de la Sesión</h3>
            <div id="modal-content">
                <!-- Loaded via JS -->
            </div>
            <button onclick="closeModal()"
                style="width: 100%; margin-top: 1.5rem; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600;">
                Cerrar
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const res = await fetch('/api/student/portal-data');
            const data = await res.json();

            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                firstDay: 1,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana'
                },
                events: data.sessions.map(s => ({
                    id: s.id,
                    title: `${s.duration_minutes}m con ${s.teacher_name || 'Profesor'}`,
                    start: s.date,
                    color: new Date(s.date) < new Date() ? '#94a3b8' : '#1A56A0',
                    extendedProps: {
                        duration: s.duration_minutes,
                        teacher: s.teacher_name,
                        homework: s.homework_done,
                        notes: s.teacher_notes,
                        date: s.date
                    }
                })),
                eventClick: (info) => {
                    showDetails(info.event.extendedProps);
                }
            });
            calendar.render();
        });

        function showDetails(props) {
            const date = new Date(props.date).toLocaleString('es-ES', { dateStyle: 'long', timeStyle: 'short' });
            document.getElementById('modal-content').innerHTML = `
                <div class="detail-row"><strong>Fecha:</strong> <span>${date}</span></div>
                <div class="detail-row"><strong>Duración:</strong> <span>${props.duration} minutos</span></div>
                <div class="detail-row"><strong>Profesor:</strong> <span>${props.teacher || 'Sin asignar'}</span></div>
                <div class="detail-row"><strong>Deberes:</strong> <span>${props.homework ? '✅ Hechos' : '❌ Pendientes'}</span></div>
                <div class="notes-box">
                    <strong>Notas del profesor:</strong><br>
                    <p style="margin-top: 0.5rem; color: #475569">${props.notes || 'No hay notas para esta sesión.'}</p>
                </div>
            `;
            document.getElementById('sessionDetails').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('sessionDetails').style.display = 'none';
        }
    </script>
</body>

</html>
