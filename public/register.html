<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiaPro - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A56A0;
            --secondary: #3b82f6;
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        .auth-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left Panel */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #1A56A0 0%, #3b82f6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            color: white;
        }

        .auth-left h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .auth-left p {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }

        .features {
            list-style: none;
        }

        .features li {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Right Panel */
        .auth-right {
            width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            min-height: 100vh;
        }

        .auth-form-container {
            width: 100%;
            max-width: 360px;
        }

        .auth-form-container h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .auth-form-container p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--secondary);
        }

        button.btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 1rem;
        }

        button.btn-primary:hover {
            opacity: 0.9;
        }

        .google-btn {
            width: 100%;
            background: white;
            color: var(--text-main);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            text-decoration: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: background 0.2s;
        }

        .google-btn:hover {
            background: #f8fafc;
        }

        .links {
            text-align: center;
        }

        .links a {
            display: block;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        @media (max-width: 1024px) {
            .auth-left {
                display: none;
            }

            .auth-right {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="/glassmorphism.css">
    <script src="/global.js"></script>
</head>

<body>

<div class="loading-overlay" id="globalLoading">
  <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil">
  	<defs>
  		<clipPath id="pencil-eraser">
  			<rect height="30" width="30" ry="5" rx="5"></rect>
  		</clipPath>
  	</defs>
  	<circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82" stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70" class="pencil__stroke"></circle>
  	<g transform="translate(100,100)" class="pencil__rotate">
  		<g fill="none">
  			<circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12" stroke-width="30" stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
  			<circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96" stroke-width="10" stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
  			<circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29" stroke-width="10" stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
  		</g>
  		<g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
  			<g class="pencil__eraser-skew">
  				<rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
  				<rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
  				<rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
  				<rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
  				<rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
  				<rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
  				<rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
  			</g>
  		</g>
  		<g transform="rotate(-90) translate(49,-30)" class="pencil__point">
  			<polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
  			<polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
  			<polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
  		</g>
  	</g>
  </svg>
  <p id="loadingText">Cargando...</p>
</div>

    <!-- BG Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-left">
            <h1>AcademiaPro</h1>
            <p>Gestiona tu academia con inteligencia</p>
            <ul class="features">
                <li>✓ Seguimiento de alumnos</li>
                <li>✓ Informes automáticos con IA</li>
                <li>✓ Comunicación con familias</li>
            </ul>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Regístrate</h2>
                <p>Crea tu academia hoy mismo</p>

                <form id="registerForm">
                    <div style="display:flex; gap:1rem; margin-bottom:1rem; justify-content: center;">
                        <label style="cursor:pointer;"><input type="radio" name="role" value="admin" checked
                                onchange="toggleRegRole()"> Crear Academia</label>
                        <label style="cursor:pointer;"><input type="radio" name="role" value="join"
                                onchange="toggleRegRole()"> Unirme</label>
                    </div>
                    <input type="text" id="name" placeholder="Nombre completo" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Contraseña" required>

                    <input type="text" id="academy_name" placeholder="Nombre de la academia" required>

                    <input type="text" id="academy_code" placeholder="Código de academia (Ej: SKAJMN)"
                        style="display:none;">
                    <div id="academy_code_feedback"
                        style="display:none; font-size: 0.85rem; margin-bottom: 1rem; margin-top: -0.5rem; text-align: left;">
                    </div>

                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>

                <a href="/auth/google" class="google-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Continuar con Google
                </a>

                <div class="links">
                    <a href="/login">¿Ya tienes cuenta? Inicia sesión</a>
                    <a href="/join">Unirte a una academia con código</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleRegRole() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const acadName = document.getElementById('academy_name');
            const acadCode = document.getElementById('academy_code');
            const acadCodeFeedback = document.getElementById('academy_code_feedback');

            if (role === 'admin') {
                acadName.style.display = 'block';
                acadName.required = true;
                acadCode.style.display = 'none';
                acadCode.required = false;
                acadCodeFeedback.style.display = 'none';
                acadCodeFeedback.innerHTML = '';
            } else {
                acadName.style.display = 'none';
                acadName.required = false;
                acadCode.style.display = 'block';
                acadCode.required = true;
                acadCodeFeedback.style.display = 'block';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const role = document.querySelector('input[name="role"]:checked').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const payload = { name, email, password };

            if (role === 'admin') {
                payload.academy_name = document.getElementById('academy_name').value;
            } else {
                const codeInput = document.getElementById('academy_code');
                const feedback = document.getElementById('academy_code_feedback');
                const code = codeInput.value.trim();

                feedback.innerHTML = 'Verificando...';
                feedback.style.color = 'var(--text-muted)';

                try {
                    const cRes = await fetch('/api/auth/check-code/' + code);
                    const cData = await cRes.json();

                    if (!cData.valid) {
                        feedback.innerHTML = '❌ Código no válido';
                        feedback.style.color = '#ef4444';
                        return;
                    } else {
                        feedback.innerHTML = '✅ ' + cData.academy_name;
                        feedback.style.color = '#10b981';
                        payload.academy_code = code;
                    }
                } catch (err) {
                    feedback.innerHTML = '❌ Error de red';
                    feedback.style.color = '#ef4444';
                    return;
                }
            }

            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                if (role === 'admin') {
                    alert('Códigos de Academia:\nProfesor: ' + data.teacher_code + '\nEstudiante: ' + data.student_code);
                }
                window.location.href = data.redirect || '/login';
            } else {
                alert(data.error);
            }
        });
    </script>
</body>

</html>
