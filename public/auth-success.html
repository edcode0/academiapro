<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiaPro - Autenticando...</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; }
        .msg { text-align: center; color: #64748b; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #1A56A0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="msg">
        <div class="spinner"></div>
        <p>Iniciando sesión...</p>
    </div>
    <script>
        (function () {
            try {
                // Read token from short-lived auth_token cookie (set by OAuth callback)
                function getCookie(name) {
                    const match = document.cookie.match(new RegExp('(?:^|;)\\s*' + name + '=([^;]+)'));
                    return match ? decodeURIComponent(match[1]) : null;
                }
                const token = getCookie('auth_token');
                if (!token) { window.location.href = '/login?error=no_token'; return; }

                // Delete the temporary cookie immediately
                document.cookie = 'auth_token=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; secure; samesite=strict';

                const payload = JSON.parse(atob(token.split('.')[1]));
                // Token is already set as httpOnly cookie by the server — no localStorage needed

                if (payload.role === 'admin') window.location.href = '/';
                else if (payload.role === 'teacher') window.location.href = '/teacher';
                else window.location.href = '/student-portal';
            } catch (e) {
                console.error('Auth-success error:', e);
                window.location.href = '/login?error=auth_failed';
            }
        })();
    </script>
</body>
</html>
