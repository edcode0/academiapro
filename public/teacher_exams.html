<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exámenes - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            display: flex;
            min-height: 100vh;
        }

        aside {
            width: 260px;
            background: var(--primary);
            color: white;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        aside h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #38bdf8;
        }

        .user-badge {
            margin-bottom: 2.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }

        .role-tag {
            background: #22c55e;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            position: relative;
        }

        nav a:hover,
        nav a.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        nav a.active {
            background-color: #1a56a0;
        }

        main {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--secondary);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .score-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .score-good {
            background: #dcfce7;
            color: #166534;
        }

        .score-bad {
            background: #fee2e2;
            color: #991b1b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            width: 450px;
            border-radius: 1rem;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }
    </style>
</head>

<body>
    <aside>
        <h1>AcademiaPro</h1>
        <div class="user-badge"><strong id="sidebarName">...</strong> <span class="role-tag">Profesor</span></div>
        <nav>
            <a href="/teacher/dashboard">Mis Alumnos</a>
            <a href="/teacher/sessions">Sesiones</a>
            <a href="/teacher/exams" class="active">Exámenes</a>
            <a href="/teacher/calendar">Calendario</a>
            <a href="/chat">Chat</a>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h2>Gestión de Exámenes</h2>
            <button class="btn btn-primary" onclick="openModal()">+ Registrar Examen</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Exámenes</h3>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h3>Nota Media</h3>
                <div class="value" id="stat-avg">0.0</div>
            </div>
            <div class="stat-card">
                <h3>% Aprobados</h3>
                <div class="value" id="stat-pass">0%</div>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Alumno</th>
                        <th>Fecha</th>
                        <th>Asignatura</th>
                        <th>Nota</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="examsTableBody"></tbody>
            </table>
        </div>
    </main>

    <div id="examModal" class="modal-overlay">
        <div class="modal">
            <h3>Registrar Examen</h3>
            <form id="examForm">
                <input type="hidden" id="examId">
                <div class="form-group"><label>Alumno</label><select id="m_student" required></select></div>
                <div class="form-group"><label>Fecha</label><input type="date" id="m_date" required></div>
                <div class="form-group"><label>Asignatura</label><input type="text" id="m_subject"
                        placeholder="Ej: Matemáticas" required></div>
                <div class="form-group"><label>Nota</label><input type="number" step="0.1" id="m_score" required></div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn" style="background:transparent; border:1px solid var(--border)"
                        onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allExams = [];

        async function init() {
            const userRes = await fetch('/auth/me');
            const user = await userRes.json();
            document.getElementById('sidebarName').textContent = user.name;

            await loadExams();
            await loadStudents();
        }

        async function loadStudents() {
            const res = await fetch('/api/teacher/students');
            const students = await res.json();
            document.getElementById('m_student').innerHTML = students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        async function loadExams() {
            const res = await fetch('/api/exams-list');
            const data = await res.json();
            allExams = data.exams;
            document.getElementById('stat-total').textContent = data.stats.totalExams;
            document.getElementById('stat-avg').textContent = data.stats.avgScore;
            document.getElementById('stat-pass').textContent = `${data.stats.passRate}%`;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('examsTableBody');
            tbody.innerHTML = allExams.map(e => `
                <tr>
                    <td>${e.student_name}</td>
                    <td>${e.date}</td>
                    <td>${e.subject}</td>
                    <td><span class="score-badge ${e.score >= 5 ? 'score-good' : 'score-bad'}">${e.score}</span></td>
                    <td><button style="border:none; cursor:pointer; background:none;" onclick="deleteExam(${e.id})">🗑️</button></td>
                </tr>
            `).join('') || '<tr><td colspan="5" style="text-align:center">No hay exámenes registrados.</td></tr>';
        }

        function openModal() { document.getElementById('examModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('examModal').style.display = 'none'; }

        document.getElementById('examForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                student_id: document.getElementById('m_student').value,
                date: document.getElementById('m_date').value,
                subject: document.getElementById('m_subject').value,
                score: parseFloat(document.getElementById('m_score').value)
            };
            const res = await fetch('/api/exams', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) { closeModal(); loadExams(); }
        };

        async function deleteExam(id) {
            if (confirm('¿Seguro?')) {
                await fetch(`/api/exams/${id}`, { method: 'DELETE' });
                loadExams();
            }
        }

        init();
    </script>
</body>

</html>
