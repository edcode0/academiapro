<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiaPro - Unirse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A56A0;
            --secondary: #3b82f6;
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        .auth-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left Panel */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #1A56A0 0%, #3b82f6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            color: white;
        }

        .auth-left h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .auth-left p {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }

        .features {
            list-style: none;
        }

        .features li {
            font-size: 1.125rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Right Panel */
        .auth-right {
            width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            min-height: 100vh;
        }

        .auth-form-container {
            width: 100%;
            max-width: 360px;
        }

        .auth-form-container h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .auth-form-container p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--secondary);
        }

        button.btn-primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 1rem;
        }

        button.btn-primary:hover {
            opacity: 0.9;
        }

        .links {
            text-align: center;
        }

        .links a {
            display: block;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        @media (max-width: 1024px) {
            .auth-left {
                display: none;
            }

            .auth-right {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <h1>AcademiaPro</h1>
            <p>Gestiona tu academia con inteligencia</p>
            <ul class="features">
                <li>✓ Seguimiento de alumnos</li>
                <li>✓ Informes automáticos con IA</li>
                <li>✓ Comunicación con familias</li>
            </ul>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <h2>Únete a tu academia</h2>
                <p>Introduce el código proporcionado por tu centro</p>

                <form id="joinForm">
                    <input type="text" id="code" placeholder="Código (ej. ABCDEF)" required>
                    <input type="text" id="name" placeholder="Tu nombre completo (como aparece en la academia)"
                        required>
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="submit" class="btn-primary">Unirse a la academia</button>
                </form>

                <div class="links">
                    <a href="/login">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('joinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/auth/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, name, email, password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/login';
            } else {
                alert(data.error);
            }
        });
    </script>
</body>

</html>
