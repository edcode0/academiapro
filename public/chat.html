<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Unified Style */
        aside {
            width: 260px;
            background: var(--primary);
            color: var(--text-muted);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
        }

        aside h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        .user-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }

        .user-info strong {
            display: block;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }

        .badge-role {
            background: #94a3b8;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
            position: relative;
        }

        nav a:hover,
        nav a.active {
            background: var(--accent);
            color: white;
        }

        .unread-dot-total {
            position: absolute;
            right: 0.75rem;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
        }

        .btn-logout {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1rem;
            display: block;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        /* Chat UI */
        #chat-container {
            flex: 1;
            display: flex;
            background: white;
            margin: 1.5rem;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #conversation-list {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #search-container {
            padding: 1.25rem;
        }

        #search-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: #f8fafc;
            outline: none;
        }

        #rooms-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        .room-item:hover {
            background: #f8fafc;
        }

        .room-item.active {
            background: #eff6ff;
            border-left: 4px solid var(--accent);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            flex-shrink: 0;
        }

        .avatar.group {
            background: #dbeafe;
            color: var(--accent);
        }

        .room-info {
            margin-left: 1rem;
            flex: 1;
            min-width: 0;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .room-name {
            font-weight: 700;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .last-msg {
            font-size: 0.85rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }

        #active-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        #chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f8fafc;
        }

        .msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
        }

        .msg.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .msg.sent .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.received .bubble {
            background: #f1f5f9;
            border: none;
            border-bottom-left-radius: 0.25rem;
        }

        .msg-info {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.25rem;
            display: flex;
            gap: 0.5rem;
        }

        .msg.sent .msg-info {
            justify-content: flex-end;
        }

        #input-area {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 0.75rem;
        }

        #msg-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.5rem;
            outline: none;
            resize: none;
            max-height: 120px;
            font-size: 0.95rem;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            #chat-container {
                margin: 0;
                border-radius: 0;
                border: none;
            }
        }
    </style>
    <link rel="stylesheet" href="/glassmorphism.css">
</head>

<body>

    <div class="loading-overlay" id="globalLoading">
        <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil">
            <defs>
                <clipPath id="pencil-eraser">
                    <rect height="30" width="30" ry="5" rx="5"></rect>
                </clipPath>
            </defs>
            <circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82"
                stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70"
                class="pencil__stroke"></circle>
            <g transform="translate(100,100)" class="pencil__rotate">
                <g fill="none">
                    <circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12"
                        stroke-width="30" stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
                    <circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96"
                        stroke-width="10" stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
                    <circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29"
                        stroke-width="10" stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
                </g>
                <g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
                    <g class="pencil__eraser-skew">
                        <rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
                        <rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
                        <rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
                        <rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
                        <rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
                        <rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
                        <rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
                    </g>
                </g>
                <g transform="rotate(-90) translate(49,-30)" class="pencil__point">
                    <polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
                    <polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
                    <polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
                </g>
            </g>
        </svg>
        <p id="loadingText">Cargando...</p>
    </div>

    <!-- BG Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside>
        <h1>AcademiaPro</h1>
        <div class="user-info">
            <strong id="userName">Cargando...</strong>
            <span id="userBadge" class="badge-role">Usuario</span>
        </div>
        <nav id="sidebarNav">
            <!-- Navigation will be injected based on role -->
        </nav>
        <div style="margin-top: auto;">
            <button class="Btn" onclick="window.location.href='/auth/logout'">
                <div class="sign">
                    <svg viewBox="0 0 512 512">
                        <path
                            d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z">
                        </path>
                    </svg>
                </div>
                <div class="text">Logout</div>
            </button>
        </div>
    </aside>

    <div id="chat-container">
        <div id="conversation-list">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Buscar conversaciones...">
            </div>
            <div id="rooms-scroll"></div>
        </div>

        <div id="active-chat">
            <div id="empty-state"
                style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8;">
                <p>Selecciona una conversación para empezar</p>
            </div>
            <div id="chat-box" style="display: none; height: 100%; flex-direction: column;">
                <header id="chat-header">
                    <div id="header-avatar" class="avatar"></div>
                    <div class="room-info">
                        <div id="header-name" class="room-name"></div>
                        <div id="header-badge" style="font-size: 0.7rem; color: #64748b;"></div>
                    </div>
                </header>
                <div id="messages-area"></div>
                <div id="typing-indicator"
                    style="padding: 0.5rem 1.5rem; font-size: 0.75rem; color: #94a3b8; font-style: italic; display: none;">
                </div>
                <div id="file-preview-container"
                    style="display: none; padding: 0.5rem 1.5rem; background: #f8fafc; border-top: 1px solid var(--border); align-items: center; gap: 1rem;">
                    <div id="file-preview-content"
                        style="display: flex; align-items: center; gap: 0.5rem; background: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border);">
                    </div>
                </div>
                <div id="input-area">
                    <div class="input-container">
                        <button class="btn-attach" id="attach-btn"
                            style="background:none; border:none; cursor:pointer; font-size:1.25rem;">📎</button>
                        <input type="file" id="file-picker" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
                            style="display: none;">
                        <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                        <div class="send-btn" id="send-btn">➤</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = '/login'; }

        const socket = io({
            auth: { token: token },
            transports: ['websocket', 'polling']
        });

        let currentUser = null;
        let activeRoom = null;
        let currentRoomId = null;
        let allRooms = [];
        const pendingTempIds = new Set();

        socket.on('connect', () => {
            console.log('Socket connected:', socket.id);
            loadRooms();
        });

        socket.on('connect_error', (err) => {
            console.error('Socket error:', err.message);
            if (err.message === 'No token' || err.message === 'Invalid token') {
                window.location.href = '/login';
            }
        });

        socket.on('new_message', (message) => {
            console.log('New message received:', message);
            if (currentRoomId === message.room_id) {
                // Deduplicate: if this is our own optimistic message echoed back, replace the temp element
                if (message.tempId && pendingTempIds.has(message.tempId)) {
                    pendingTempIds.delete(message.tempId);
                    const tempEl = document.querySelector(`[data-temp-id="${message.tempId}"]`);
                    if (tempEl) {
                        tempEl.removeAttribute('data-temp-id');
                        tempEl.dataset.id = message.id;
                        return;
                    }
                }
                appendMessage(message);
                markRoomAsRead(message.room_id);
            }
            updateRoomLastMessage(message.room_id, message.content);
        });

        async function init() {
            const userRes = await fetch('/auth/me');
            if (!userRes.ok) window.location.href = '/login';
            currentUser = await userRes.json();
            document.getElementById('userName').textContent = currentUser.name;
            const badge = document.getElementById('userBadge');
            badge.textContent = currentUser.role === 'admin' ? 'Admin' : currentUser.role === 'teacher' ? 'Profesor' : 'Alumno';
            badge.style.background = currentUser.role === 'admin' ? '#10b981' : currentUser.role === 'teacher' ? '#3b82f6' : '#f59e0b';

            renderSidebar();

            try { await fetch('/api/chat/ensure-rooms', { method: 'POST' }); } catch (e) { console.error(e); }
            await loadRooms();
            updateTotalUnread();

            document.getElementById('search-input').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderRooms(allRooms.filter(r => (r.name || '').toLowerCase().includes(term)));
            };

            document.getElementById('msg-input').onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            };

            document.getElementById('send-btn').onclick = () => sendMessage();

            // Attachment button opens file picker
            document.getElementById('attach-btn').onclick = () => document.getElementById('file-picker').click();

            // File picker: upload then send as message
            document.getElementById('file-picker').onchange = async (e) => {
                const file = e.target.files[0];
                if (!file || !currentRoomId) return;
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const uploadRes = await fetch('/api/chat/upload-file', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: formData
                    });
                    if (!uploadRes.ok) { console.error('Upload failed:', await uploadRes.text()); return; }
                    const fileData = await uploadRes.json();
                    await fetch(`/api/chat/rooms/${currentRoomId}/messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ content: fileData.file_name, file_url: fileData.file_url, file_name: fileData.file_name, file_type: fileData.file_type })
                    });
                } catch (err) {
                    console.error('File send error:', err);
                } finally {
                    e.target.value = '';
                }
            };
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            let links = '';
            if (currentUser.role === 'admin') {
                links = `
                    <div class="nav-section-title">Gestión de Academia</div>
                    <a href="/">🏠 Dashboard</a>
                    <a href="/students">👥 Estudiantes</a>
                    <a href="/admin/teachers">👨‍🏫 Profesores</a>
                    <a href="/payments">💳 Pagos</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                    <a href="/settings">⚙️ Configuración</a>
                    <div class="nav-section-title">Mi actividad docente</div>
                    <a href="/teacher/dashboard">👥 Mis Alumnos</a>
                    <a href="/teacher/sessions">📅 Sesiones</a>
                    <a href="/teacher/exams">📝 Exámenes</a>
                    <a href="/teacher/transcripts">📝 Transcripciones</a>
                    <a href="/teacher/calendar">🗓️ Calendario</a>
                    <a href="/ai-tutor">🤖 Asistente IA</a>
                `;
            } else if (currentUser.role === 'teacher') {
                links = `
                    <a href="/teacher/dashboard">👥 Mis Alumnos</a>
                    <a href="/teacher/sessions">📅 Sesiones</a>
                    <a href="/teacher/exams">📝 Exámenes</a>
                    <a href="/teacher/transcripts">📝 Transcripciones</a>
                    <a href="/teacher/calendar">🗓️ Calendario</a>
                    <a href="/ai-tutor">🤖 Asistente IA</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                    <a href="/teacher/settings">⚙️ Configuración</a>
                `;
            } else {
                links = `
                    <a href="/student-portal">🏠 Mi Panel</a>
                    <a href="/student-portal/calendar">📅 Mi Calendario</a>
                    <a href="/student-portal/exams">📝 Mis Notas</a>
                    <a href="/student-portal/payments">💳 Mis Pagos</a>
                    <a href="/exam-simulator">📋 Simulacro</a>
                    <a href="/ai-tutor">🤖 Tutor IA</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                `;
            }
            nav.innerHTML = links;
        }

        async function loadRooms() {
            const res = await fetch('/api/chat/rooms', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            allRooms = await res.json();
            renderRooms(allRooms);
            socket.emit('join_rooms', allRooms.map(r => r.id));

            // Auto-open room from URL param ?room=ROOM_ID (deep-link from notifications)
            const urlParams = new URLSearchParams(window.location.search);
            const targetRoomId = urlParams.get('room');
            if (targetRoomId) {
                const targetRoom = allRooms.find(r => String(r.id) === String(targetRoomId));
                if (targetRoom) selectRoom(targetRoom);
            }
        }

        function renderRooms(rooms) {
            rooms = rooms.filter(r => r !== null && r !== undefined && r.id);
            const container = document.getElementById('rooms-scroll');

            // Fix sorting: pin group chat to the top, then sort by latest activity
            rooms.sort((a, b) => {
                if (a.type === 'group' && b.type !== 'group') return -1;
                if (a.type !== 'group' && b.type === 'group') return 1;
                const dateA = new Date(a.last_message_date || a.created_at || 0).getTime();
                const dateB = new Date(b.last_message_date || b.created_at || 0).getTime();
                return dateB - dateA;
            });

            container.innerHTML = rooms.map(room => {
                const initials = (room.name || 'Chat').split(' ').map(n => n[0]).join('').substring(0, 2);
                return `
                    <div class="room-item ${activeRoom && activeRoom.id === room.id ? 'active' : ''}" onclick="selectRoom(${JSON.stringify(room).replace(/"/g, '&quot;')})">
                        <div class="avatar ${room.type === 'group' ? 'group' : ''}">${initials}</div>
                        <div class="room-info">
                            <div class="room-header">
                                <span class="room-name">${room.name || 'Chat'}</span>
                            </div>
                            <div class="last-msg">${room.last_message || 'Sin mensajes'}</div>
                        </div>
                        ${room.unread_count > 0 ? `<div class="unread-badge">${room.unread_count}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function selectRoom(room) {
            activeRoom = room;
            currentRoomId = room.id;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            document.getElementById('header-name').textContent = room.name || 'Chat';
            document.getElementById('header-badge').textContent = room.type === 'group' ? 'Grupo' : room.other_role;
            document.getElementById('header-avatar').textContent = (room.name || 'Chat')[0];

            // ALWAYS clear messages first
            const container = document.getElementById('messages-area');
            container.innerHTML = '';

            // Join socket room
            socket.emit('join_room', room.id);

            // Fetch only messages for THIS room
            const res = await fetch(`/api/chat/rooms/${room.id}/messages`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const messages = await res.json();

            // Render only these messages
            if (Array.isArray(messages)) {
                renderMessages(messages);
            }

            await fetch(`/api/chat/mark-read/${room.id}`, { method: 'POST' });
            loadRooms();
            updateTotalUnread();
        }

        function renderMessage(msg) {
            const isMine = msg.sender_id === currentUser.id;
            let fileHTML = '';

            if (msg.file_url) {
                if (msg.file_type && msg.file_type.startsWith('image/')) {
                    fileHTML = `<img src="${msg.file_url}" style="max-width:200px;border-radius:8px;margin-top:4px;display:block;">`;
                } else if (msg.file_type === 'application/pdf') {
                    fileHTML = `<a href="${msg.file_url}" target="_blank" style="display:flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);padding:8px 12px;border-radius:8px;margin-top:4px;text-decoration:none;color:#6366f1;">📄 ${msg.file_name} <span style="font-size:0.8em">Abrir PDF</span></a>`;
                } else {
                    fileHTML = `<a href="${msg.file_url}" target="_blank" style="display:flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);padding:8px 12px;border-radius:8px;margin-top:4px;text-decoration:none;color:#6366f1;">📎 ${msg.file_name}</a>`;
                }
            }

            return `<div class="msg ${isMine ? 'sent' : 'received'}" data-id="${msg.id}">
        <div class="bubble">
            ${msg.content ? `<div>${msg.content}</div>` : ''}
            ${fileHTML}
        </div>
        <div class="msg-info">
            ${!isMine ? `<span>${msg.sender_name || (activeRoom && activeRoom.name) || ''}</span>` : ''}
            <span class="time">${new Date(msg.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
    </div>`;
        }

        function renderMessages(messages) {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages.map(msg => renderMessage(msg)).join('');
            area.scrollTop = area.scrollHeight;
        }

        function appendMessage(msg) {
            const area = document.getElementById('messages-area');
            const duplicate = area.querySelector(`.msg[data-id="${msg.id}"]`);
            if (duplicate) return;
            area.insertAdjacentHTML('beforeend', renderMessage(msg));
            area.scrollTop = area.scrollHeight;
        }

        async function markRoomAsRead(roomId) {
            await fetch(`/api/chat/mark-read/${roomId}`, { method: 'POST' });
            updateTotalUnread();
        }

        function updateRoomLastMessage(roomId, content) {
            const room = allRooms.find(r => r.id === roomId);
            if (room) {
                room.last_message = content;
                renderRooms(allRooms);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const content = input.value.trim();
            if (!content || !currentRoomId) return;

            // Generate a unique tempId for deduplication
            const tempId = 'temp-' + Date.now() + '-' + Math.random().toString(36).slice(2);
            pendingTempIds.add(tempId);

            // Optimistic UI update — append element with data-temp-id so we can match it later
            const tempMessage = {
                id: 'temp_' + Date.now(),
                room_id: currentRoomId,
                sender_id: currentUser.id,
                sender_name: currentUser.name,
                sender_role: currentUser.role,
                content: content,
                created_at: new Date().toISOString()
            };
            const area = document.getElementById('messages-area');
            const tempHTML = renderMessage(tempMessage);
            // Insert and immediately tag with data-temp-id
            area.insertAdjacentHTML('beforeend', tempHTML);
            const tempEl = area.lastElementChild;
            tempEl.dataset.tempId = tempId;
            area.scrollTop = area.scrollHeight;

            input.value = '';

            // Send via socket, including tempId so the server echoes it back
            socket.emit('sendMessage', { roomId: currentRoomId, content, tempId });
        }

        async function updateTotalUnread() {
            const res = await fetch('/api/chat/unread-count');
            const data = await res.json();
            const badge = document.getElementById('total-unread');
            if (badge) {
                if (data.count > 0) { badge.textContent = data.count; badge.style.display = 'block'; }
                else badge.style.display = 'none';
            }
        }

        init();
    </script>
</body>

</html>
