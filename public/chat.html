<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Unified Style */
        aside {
            width: 260px;
            background: var(--primary);
            color: var(--text-muted);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        aside h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        .user-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }

        .user-info strong {
            display: block;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }

        .badge-role {
            background: #94a3b8;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
            position: relative;
        }

        nav a:hover,
        nav a.active {
            background: var(--accent);
            color: white;
        }

        .unread-dot-total {
            position: absolute;
            right: 0.75rem;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
        }

        .btn-logout {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1rem;
            display: block;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        /* Chat UI */
        #chat-container {
            flex: 1;
            display: flex;
            background: white;
            margin: 1.5rem;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #conversation-list {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #search-container {
            padding: 1.25rem;
        }

        #search-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: #f8fafc;
            outline: none;
        }

        #rooms-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        .room-item:hover {
            background: #f8fafc;
        }

        .room-item.active {
            background: #eff6ff;
            border-left: 4px solid var(--accent);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            flex-shrink: 0;
        }

        .avatar.group {
            background: #dbeafe;
            color: var(--accent);
        }

        .room-info {
            margin-left: 1rem;
            flex: 1;
            min-width: 0;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .room-name {
            font-weight: 700;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .last-msg {
            font-size: 0.85rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }

        #active-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        #chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f8fafc;
        }

        .msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
        }

        .msg.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .msg.sent .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.received .bubble {
            background: white;
            border: 1px solid var(--border);
            border-bottom-left-radius: 0.25rem;
        }

        .msg-info {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.25rem;
            display: flex;
            gap: 0.5rem;
        }

        .msg.sent .msg-info {
            justify-content: flex-end;
        }

        #input-area {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 0.75rem;
        }

        #msg-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.5rem;
            outline: none;
            resize: none;
            max-height: 120px;
            font-size: 0.95rem;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            #chat-container {
                margin: 0;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>

<body>
    <aside>
        <h1>AcademiaPro</h1>
        <div class="user-info">
            <strong id="userName">Cargando...</strong>
            <span id="userBadge" class="badge-role">Usuario</span>
        </div>
        <nav id="sidebarNav">
            <!-- Navigation will be injected based on role -->
        </nav>
        <div style="margin-top: auto;">
            <a href="/auth/logout" class="btn-logout">🚪 Cerrar Sesión</a>
        </div>
    </aside>

    <div id="chat-container">
        <div id="conversation-list">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Buscar conversaciones...">
            </div>
            <div id="rooms-scroll"></div>
        </div>

        <div id="active-chat">
            <div id="empty-state"
                style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8;">
                <p>Selecciona una conversación para empezar</p>
            </div>
            <div id="chat-box" style="display: none; height: 100%; flex-direction: column;">
                <header id="chat-header">
                    <div id="header-avatar" class="avatar"></div>
                    <div class="room-info">
                        <div id="header-name" class="room-name"></div>
                        <div id="header-badge" style="font-size: 0.7rem; color: #64748b;"></div>
                    </div>
                </header>
                <div id="messages-area"></div>
                <div id="typing-indicator"
                    style="padding: 0.5rem 1.5rem; font-size: 0.75rem; color: #94a3b8; font-style: italic; display: none;">
                </div>
                <div id="input-area">
                    <div class="input-container">
                        <button class="btn-attach" id="attach-btn"
                            style="background:none; border:none; cursor:pointer; font-size:1.25rem;">📎</button>
                        <input type="file" id="file-picker" style="display: none;">
                        <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                        <div class="send-btn" id="send-btn">➤</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let activeRoom = null;
        let allRooms = [];

        async function init() {
            const userRes = await fetch('/auth/me');
            if (!userRes.ok) window.location.href = '/login';
            currentUser = await userRes.json();

            document.getElementById('userName').textContent = currentUser.name;
            const badge = document.getElementById('userBadge');
            badge.textContent = currentUser.role === 'admin' ? 'Admin' : currentUser.role === 'teacher' ? 'Profesor' : 'Alumno';
            badge.style.background = currentUser.role === 'admin' ? '#10b981' : currentUser.role === 'teacher' ? '#3b82f6' : '#f59e0b';

            renderSidebar();

            socket.emit('join_academy', currentUser.academy_id);
            await loadRooms();
            updateTotalUnread();

            document.getElementById('search-input').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderRooms(allRooms.filter(r => r.name.toLowerCase().includes(term)));
            };

            document.getElementById('msg-input').onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            };

            document.getElementById('send-btn').onclick = () => sendMessage();
            document.getElementById('attach-btn').onclick = () => document.getElementById('file-picker').click();
            document.getElementById('file-picker').onchange = handleFileUpload;
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            let links = '';
            if (currentUser.role === 'admin') {
                links = `
                    <a href="/">🏠 Dashboard</a>
                    <a href="/students">👥 Estudiantes</a>
                    <a href="/sessions">📅 Sesiones</a>
                    <a href="/calendar">🗓️ Calendario</a>
                    <a href="/exams">📝 Exámenes</a>
                    <a href="/payments">💳 Pagos</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                    <a href="/settings">⚙️ Configuración</a>
                `;
            } else if (currentUser.role === 'teacher') {
                links = `
                    <a href="/teacher/dashboard">🏠 Mis Alumnos</a>
                    <a href="/teacher/sessions">📅 Sesiones</a>
                    <a href="/teacher/exams">📝 Exámenes</a>
                    <a href="/teacher/calendar">🗓️ Calendario</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                `;
            } else {
                links = `
                    <a href="/student-portal">🏠 Mi Panel</a>
                    <a href="/student-portal/exams">📝 Mis Notas</a>
                    <a href="/student-portal/calendar">📅 Mi Calendario</a>
                    <a href="/student-portal/payments">💳 Mis Pagos</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                `;
            }
            nav.innerHTML = links;
        }

        async function loadRooms() {
            const res = await fetch('/api/chat/rooms');
            allRooms = await res.json();
            renderRooms(allRooms);
            socket.emit('join_rooms', allRooms.map(r => r.id));
        }

        function renderRooms(rooms) {
            const container = document.getElementById('rooms-scroll');
            container.innerHTML = rooms.map(room => {
                const initials = room.name.split(' ').map(n => n[0]).join('').substring(0, 2);
                return `
                    <div class="room-item ${activeRoom && activeRoom.id === room.id ? 'active' : ''}" onclick="selectRoom(${JSON.stringify(room).replace(/"/g, '&quot;')})">
                        <div class="avatar ${room.type === 'group' ? 'group' : ''}">${initials}</div>
                        <div class="room-info">
                            <div class="room-header">
                                <span class="room-name">${room.name}</span>
                            </div>
                            <div class="last-msg">${room.last_message || 'Sin mensajes'}</div>
                        </div>
                        ${room.unread_count > 0 ? `<div class="unread-badge">${room.unread_count}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function selectRoom(room) {
            activeRoom = room;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            document.getElementById('header-name').textContent = room.name;
            document.getElementById('header-badge').textContent = room.type === 'group' ? 'Grupo' : room.other_role;
            document.getElementById('header-avatar').textContent = room.name[0];

            renderRooms(allRooms);
            const res = await fetch(`/api/chat/messages/${room.id}`);
            const messages = await res.json();
            renderMessages(messages);

            await fetch(`/api/chat/mark-read/${room.id}`, { method: 'POST' });
            loadRooms();
            updateTotalUnread();
        }

        function renderMessages(messages) {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages.map(msg => `
                <div class="msg ${msg.sender_id === currentUser.id ? 'sent' : 'received'}">
                    <div class="bubble">
                        ${msg.file_url ? `<a href="${msg.file_url}" target="_blank" style="color:inherit; display:block; margin-bottom:0.5rem; text-decoration:none; background:rgba(0,0,0,0.1); padding:0.5rem; border-radius:0.5rem;">📄 ${msg.file_name}</a>` : ''}
                        ${msg.content || ''}
                    </div>
                    <div class="msg-info">
                        ${msg.sender_id !== currentUser.id && activeRoom.type === 'group' ? `<span>${msg.sender_name}</span>` : ''}
                        <span>${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage(fileData = null) {
            const input = document.getElementById('msg-input');
            const data = {
                academy_id: currentUser.academy_id,
                room_id: activeRoom.id,
                sender_id: currentUser.id,
                content: input.value.trim(),
                file_url: fileData ? fileData.url : null,
                file_name: fileData ? fileData.name : null
            };
            if (!data.content && !data.file_url) return;
            socket.emit('sendMessage', data);
            input.value = '';
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/chat/upload', { method: 'POST', body: formData });
            sendMessage(await res.json());
        }

        async function updateTotalUnread() {
            const res = await fetch('/api/chat/unread-count');
            const data = await res.json();
            const badge = document.getElementById('total-unread');
            if (badge) {
                if (data.count > 0) { badge.textContent = data.count; badge.style.display = 'block'; }
                else badge.style.display = 'none';
            }
        }

        socket.on('new_message', (msg) => {
            if (activeRoom && activeRoom.id === msg.room_id) selectRoom(activeRoom);
            else { loadRooms(); updateTotalUnread(); }
        });

        init();
    </script>
</body>

</html>
