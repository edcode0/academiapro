<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Sidebar Unified Style */
        aside {
            width: 260px;
            background: var(--primary);
            color: var(--text-muted);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
        }

        aside h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        .user-info {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }

        .user-info strong {
            display: block;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }

        .badge-role {
            background: #94a3b8;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
            position: relative;
        }

        nav a:hover,
        nav a.active {
            background: var(--accent);
            color: white;
        }

        .unread-dot-total {
            position: absolute;
            right: 0.75rem;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
            font-weight: 600;
        }

        .btn-logout {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1rem;
            display: block;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        /* Chat UI */
        #chat-container {
            flex: 1;
            display: flex;
            background: white;
            margin: 1.5rem;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #conversation-list {
            width: 320px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #search-container {
            padding: 1.25rem;
        }

        #search-input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            background: #f8fafc;
            outline: none;
        }

        #rooms-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .room-item {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        .room-item:hover {
            background: #f8fafc;
        }

        .room-item.active {
            background: #eff6ff;
            border-left: 4px solid var(--accent);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            flex-shrink: 0;
        }

        .avatar.group {
            background: #dbeafe;
            color: var(--accent);
        }

        .room-info {
            margin-left: 1rem;
            flex: 1;
            min-width: 0;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .room-name {
            font-weight: 700;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .last-msg {
            font-size: 0.85rem;
            color: #64748b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }

        #active-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        #chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f8fafc;
        }

        .msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
        }

        .msg.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .msg.sent .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .msg.received .bubble {
            background: #f1f5f9;
            border: none;
            border-bottom-left-radius: 0.25rem;
        }

        .msg-info {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.25rem;
            display: flex;
            gap: 0.5rem;
        }

        .msg.sent .msg-info {
            justify-content: flex-end;
        }

        #input-area {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 0.75rem;
        }

        #msg-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.5rem;
            outline: none;
            resize: none;
            max-height: 120px;
            font-size: 0.95rem;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            #chat-container {
                margin: 0;
                border-radius: 0;
                border: none;
            }
        }
    </style>
    <link rel="stylesheet" href="/glassmorphism.css">
</head>

<body>

            <g transform="translate(100,100)" class="pencil__rotate">

                    <circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12"

                        <rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
                        <rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
                        <rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
                        <rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
                        <rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
                        <rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
                    </g>
                </g>
                <g transform="rotate(-90) translate(49,-30)" class="pencil__point">
                    <polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>

        <p id="loadingText">Cargando...</p>
    </div>

    <!-- BG Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside>
        <h1>AcademiaPro</h1>
        <div class="user-info">
            <strong id="userName">Cargando...</strong>
            <span id="userBadge" class="badge-role">Usuario</span>
        </div>
        <nav id="sidebarNav">
            <!-- Navigation will be injected based on role -->
        </nav>
        <div style="margin-top: auto;">
            <button class="Btn" onclick="window.location.href='/auth/logout'">
                <div class="sign">
                    <svg viewBox="0 0 512 512">
                        <path
                            d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z">
                        </path>
                    </svg>
                </div>
                <div class="text">Logout</div>
            </button>
        </div>
    </aside>

    <div id="chat-container">
        <div id="conversation-list">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Buscar conversaciones...">
            </div>
            <div id="rooms-scroll"></div>
        </div>

        <div id="active-chat">
            <div id="empty-state"
                style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8;">
                <p>Selecciona una conversación para empezar</p>
            </div>
            <div id="chat-box" style="display: none; height: 100%; flex-direction: column;">
                <header id="chat-header">
                    <div id="header-avatar" class="avatar"></div>
                    <div class="room-info">
                        <div id="header-name" class="room-name"></div>
                        <div id="header-badge" style="font-size: 0.7rem; color: #64748b;"></div>
                    </div>
                </header>
                <div id="messages-area"></div>
                <div id="typing-indicator"
                    style="padding: 0.5rem 1.5rem; font-size: 0.75rem; color: #94a3b8; font-style: italic; display: none;">
                </div>
                <div id="file-preview-container"
                    style="display: none; padding: 0.5rem 1.5rem; background: #f8fafc; border-top: 1px solid var(--border); align-items: center; gap: 1rem;">
                    <div id="file-preview-content"
                        style="display: flex; align-items: center; gap: 0.5rem; background: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border);">
                    </div>
                </div>
                <div id="input-area">
                    <div class="input-container">
                        <button class="btn-attach" id="attach-btn"
                            style="background:none; border:none; cursor:pointer; font-size:1.25rem;">📎</button>
                        <input type="file" id="file-picker" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx"
                            style="display: none;">
                        <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
                        <div class="send-btn" id="send-btn">➤</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        function getAuthToken() {
            const token = localStorage.getItem('token') ||
                localStorage.getItem('authToken') ||
                localStorage.getItem('jwt') ||
                sessionStorage.getItem('token') ||
                sessionStorage.getItem('authToken');
            const keyUsed = localStorage.getItem('token') ? 'localStorage.token'
                : localStorage.getItem('authToken') ? 'localStorage.authToken'
                : sessionStorage.getItem('token') ? 'sessionStorage.token' : 'none';
            console.log('Token found:', token ? 'YES' : 'NO', '| Key:', keyUsed);
            return token;
        }

        const token = getAuthToken();
        if (!token) {
            console.error('No token found, redirecting to login');
            window.location.href = '/login';
        }
        const socket = io({
            auth: { token: token },
            transports: ['websocket', 'polling']
        });

        let currentUser = null;
        let activeRoom = null;
        let allRooms = [];

        socket.on('connect', () => {
            console.log('✅ Socket connected, id:', socket.id);

            // Try all possible token locations
            let token = getAuthToken();

            console.log('Token value:', token ? token.substring(0, 20) + '...' : 'NOT FOUND');

            if (!token) {
                console.error('❌ No token found! User may not be logged in.');
                // Try to get token from the page itself
                const metaToken = document.querySelector('meta[name="token"]');
                if (metaToken) {
                    token = metaToken.content;
                    console.log('Token found via meta tag');
                }
            }

            socket.emit('authenticate', token);
        });

        socket.on('authenticated', (data) => {
            console.log('🔐 Auth response:', data);
            if (data.success) {
                console.log('✅ Socket authenticated as userId:', data.userId);
                loadRooms(); // load rooms after auth confirmed
            } else {
                console.error('❌ Socket auth failed');
            }
        });

        socket.on('connect_error', (err) => {
            console.error('Socket connection error:', err);
        });

        async function init() {
            const userRes = await fetch('/auth/me');
            if (!userRes.ok) window.location.href = '/login';
            currentUser = await userRes.json();
            document.getElementById('userName').textContent = currentUser.name;
            const badge = document.getElementById('userBadge');
            badge.textContent = currentUser.role === 'admin' ? 'Admin' : currentUser.role === 'teacher' ? 'Profesor' : 'Alumno';
            badge.style.background = currentUser.role === 'admin' ? '#10b981' : currentUser.role === 'teacher' ? '#3b82f6' : '#f59e0b';

            renderSidebar();

            socket.emit('join_academy', currentUser.academy_id);
            try { await fetch('/api/chat/ensure-rooms', { method: 'POST' }); } catch (e) { console.error(e); }
            await loadRooms();
            updateTotalUnread();

            document.getElementById('search-input').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                renderRooms(allRooms.filter(r => (r.name || '').toLowerCase().includes(term)));
            };

            document.getElementById('msg-input').onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            };

            document.getElementById('send-btn').onclick = () => sendMessage();
            document.getElementById('attach-btn').onclick = () => document.getElementById('file-picker').click();
            document.getElementById('file-picker').onchange = handleFileUpload;
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            let links = '';
            if (currentUser.role === 'admin') {
                links = `
                    <a href="/">🏠 Dashboard</a>
                    <a href="/students">👥 Estudiantes</a>
                    <a href="/admin/teachers">👨‍🏫 Profesores</a>
                    <a href="/sessions">📅 Sesiones</a>
                    <a href="/calendar">🗓️ Calendario</a>
                    <a href="/exams">📝 Exámenes</a>
                    <a href="/payments">💳 Pagos</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                    <a href="/settings">⚙️ Configuración</a>
                `;
            } else if (currentUser.role === 'teacher') {
                links = `
                    <a href="/teacher/dashboard">👥 Mis Alumnos</a>
                    <a href="/teacher/sessions">📅 Sesiones</a>
                    <a href="/teacher/exams">📝 Exámenes</a>
                    <a href="/teacher/calendar">🗓️ Calendario</a>
                    <a href="/ai-tutor">🤖 Asistente IA</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                    <a href="/teacher/settings">⚙️ Configuración</a>
                `;
            } else {
                links = `
                    <a href="/student-portal">🏠 Mi Panel</a>
                    <a href="/student-portal/calendar">📅 Mi Calendario</a>
                    <a href="/student-portal/exams">📝 Mis Notas</a>
                    <a href="/student-portal/payments">💳 Mis Pagos</a>
                    <a href="/exam-simulator">📋 Simulacro</a>
                    <a href="/ai-tutor">🤖 Tutor IA</a>
                    <a href="/chat" class="active">💬 Chat <span id="total-unread" class="unread-dot-total"></span></a>
                `;
            }
            nav.innerHTML = links;
        }

        async function loadRooms() {
            const res = await fetch('/api/chat/rooms');
            allRooms = await res.json();
            renderRooms(allRooms);
            socket.emit('join_rooms', allRooms.map(r => r.id));
        }

        function renderRooms(rooms) {
            rooms = rooms.filter(r => r !== null && r !== undefined && r.id);
            const container = document.getElementById('rooms-scroll');

            // Fix sorting: pin group chat to the top, then sort by latest activity
            rooms.sort((a, b) => {
                if (a.type === 'group' && b.type !== 'group') return -1;
                if (a.type !== 'group' && b.type === 'group') return 1;
                const dateA = new Date(a.last_message_date || a.created_at || 0).getTime();
                const dateB = new Date(b.last_message_date || b.created_at || 0).getTime();
                return dateB - dateA;
            });

            container.innerHTML = rooms.map(room => {
                const initials = (room.name || 'Chat').split(' ').map(n => n[0]).join('').substring(0, 2);
                return `
                    <div class="room-item ${activeRoom && activeRoom.id === room.id ? 'active' : ''}" onclick="selectRoom(${JSON.stringify(room).replace(/"/g, '&quot;')})">
                        <div class="avatar ${room.type === 'group' ? 'group' : ''}">${initials}</div>
                        <div class="room-info">
                            <div class="room-header">
                                <span class="room-name">${room.name || 'Chat'}</span>
                            </div>
                            <div class="last-msg">${room.last_message || 'Sin mensajes'}</div>
                        </div>
                        ${room.unread_count > 0 ? `<div class="unread-badge">${room.unread_count}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function selectRoom(room) {
            activeRoom = room;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            document.getElementById('header-name').textContent = room.name || 'Chat';
            document.getElementById('header-badge').textContent = room.type === 'group' ? 'Grupo' : room.other_role;
            document.getElementById('header-avatar').textContent = (room.name || 'Chat')[0];

            // ALWAYS clear messages first
            const container = document.getElementById('messages-area');
            container.innerHTML = '';

            // Join socket room
            socket.emit('join_room', room.id);

            // Fetch only messages for THIS room
            let token = '';
            try { token = typeof getAuthToken === 'function' ? getAuthToken() : ''; } catch (e) { }
            const options = token ? { headers: { 'Authorization': 'Bearer ' + token } } : {};

            const res = await fetch(`/api/chat/rooms/${room.id}/messages`, options);
            const messages = await res.json();

            // Render only these messages
            if (Array.isArray(messages)) {
                renderMessages(messages);
            }

            await fetch(`/api/chat/mark-read/${room.id}`, { method: 'POST' });
            loadRooms();
            updateTotalUnread();
        }

        function renderMessage(msg) {
            const isMine = msg.sender_id === currentUser.id;
            let fileHTML = '';

            if (msg.file_url) {
                if (msg.file_type && msg.file_type.startsWith('image/')) {
                    fileHTML = `<img src="${msg.file_url}" style="max-width:200px;border-radius:8px;margin-top:4px;display:block;">`;
                } else if (msg.file_type === 'application/pdf') {
                    fileHTML = `<a href="${msg.file_url}" target="_blank" style="display:flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);padding:8px 12px;border-radius:8px;margin-top:4px;text-decoration:none;color:#6366f1;">📄 ${msg.file_name} <span style="font-size:0.8em">Abrir PDF</span></a>`;
                } else {
                    fileHTML = `<a href="${msg.file_url}" target="_blank" style="display:flex;align-items:center;gap:6px;background:rgba(99,102,241,0.1);padding:8px 12px;border-radius:8px;margin-top:4px;text-decoration:none;color:#6366f1;">📎 ${msg.file_name}</a>`;
                }
            }

            return `<div class="msg ${isMine ? 'sent' : 'received'}" data-id="${msg.id}">
        <div class="bubble">
            ${msg.content ? `<div>${msg.content}</div>` : ''}
            ${fileHTML}
        </div>
        <div class="msg-info">
            ${!isMine ? `<span>${msg.sender_name || (activeRoom && activeRoom.name) || ''}</span>` : ''}
            <span class="time">${new Date(msg.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
    </div>`;
        }

        function renderMessages(messages) {
            const area = document.getElementById('messages-area');
            area.innerHTML = messages.map(msg => renderMessage(msg)).join('');
            area.scrollTop = area.scrollHeight;
        }

        let pendingFile = null;

        function handleFileUpload(e) {
            pendingFile = e.target.files[0];
            if (!pendingFile) return;

            const container = document.getElementById('file-preview-container');
            const content = document.getElementById('file-preview-content');

            container.style.display = 'flex';

            let previewHtml = '';
            if (pendingFile.type.startsWith('image/')) {
                const tempUrl = URL.createObjectURL(pendingFile);
                previewHtml = `<img src="${tempUrl}" style="height: 40px; border-radius: 4px;"> <span style="font-size: 0.85rem; font-weight:600; color: var(--text-main);">${pendingFile.name}</span>`;
            } else if (pendingFile.type === 'application/pdf') {
                previewHtml = `📄 <span style="font-size: 0.85rem; font-weight:600; color: var(--text-main);">${pendingFile.name}</span>`;
            } else {
                previewHtml = `📎 <span style="font-size: 0.85rem; font-weight:600; color: var(--text-main);">${pendingFile.name}</span>`;
            }

            previewHtml += `<button onclick="clearFileSelection()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold; margin-left:1rem; font-size: 1.1rem; padding: 0 0.5rem;">×</button>`;
            content.innerHTML = previewHtml;

            e.target.value = '';
        }

        function clearFileSelection() {
            pendingFile = null;
            document.getElementById('file-preview-container').style.display = 'none';
            document.getElementById('file-preview-content').innerHTML = '';
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const txt = input.value.trim();
            if (!txt && !pendingFile) return;

            let file_url = null;
            let file_name = null;
            let file_type = null;

            if (pendingFile) {
                const formData = new FormData();
                formData.append('file', pendingFile);
                try {
                    const sendBtn = document.getElementById('send-btn');
                    sendBtn.style.opacity = '0.5';
                    sendBtn.style.pointerEvents = 'none';

                    const res = await fetch('/api/chat/upload-file', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + getAuthToken() },
                        body: formData
                    });

                    if (!res.ok) {
                        const errData = await res.json();
                        alert('Error subiendo archivo: ' + (errData.error || res.statusText));
                        throw new Error('Upload error');
                    }
                    const dat = await res.json();
                    file_url = dat.file_url;
                    file_name = dat.file_name;
                    file_type = dat.file_type;
                } catch (err) {
                    console.error('Error uploading file', err);
                    const sendBtn = document.getElementById('send-btn');
                    sendBtn.style.opacity = '1';
                    sendBtn.style.pointerEvents = 'auto';
                    return;
                } finally {
                    const sendBtn = document.getElementById('send-btn');
                    sendBtn.style.opacity = '1';
                    sendBtn.style.pointerEvents = 'auto';
                }
            }

            const tempId = 'temp_' + Date.now();
            const messageData = {
                academy_id: currentUser.academy_id,
                room_id: activeRoom.id,
                sender_id: currentUser.id,
                content: txt,
                file_url: file_url,
                file_name: file_name,
                file_type: file_type,
                id: tempId,
                created_at: new Date().toISOString(),
                sender_name: currentUser.name
            };

            const area = document.getElementById('messages-area');
            area.insertAdjacentHTML('beforeend', renderMessage(messageData));
            area.scrollTop = area.scrollHeight;

            socket.emit('sendMessage', messageData);
            input.value = '';
            clearFileSelection();
        }

        async function updateTotalUnread() {
            const res = await fetch('/api/chat/unread-count');
            const data = await res.json();
            const badge = document.getElementById('total-unread');
            if (badge) {
                if (data.count > 0) { badge.textContent = data.count; badge.style.display = 'block'; }
                else badge.style.display = 'none';
            }
        }

        socket.on('new_message', (msg) => {
            if (!activeRoom || activeRoom.id !== msg.room_id) {
                updateTotalUnread();
                loadRooms();
                return; // ignore messages from other rooms
            }

            const area = document.getElementById('messages-area');

            // Find existing temp message
            const isMatched = Array.from(area.querySelectorAll('.msg')).find(el => {
                const dataId = el.getAttribute('data-id');
                if (dataId && dataId.startsWith('temp_')) {
                    const contentEl = el.querySelector('.bubble div');
                    const htmlContent = contentEl ? contentEl.textContent.trim() : '';
                    const msgContent = msg.content ? msg.content.trim() : '';
                    if (htmlContent === msgContent) return true;
                    if (!msgContent && msg.file_url && el.innerHTML.includes(msg.file_name || 'Archivo')) return true;
                }
                return false;
            });

            if (isMatched) {
                isMatched.setAttribute('data-id', msg.id);
            } else {
                const duplicate = area.querySelector(`.msg[data-id="${msg.id}"]`);
                if (!duplicate) {
                    area.insertAdjacentHTML('beforeend', renderMessage(msg));
                    area.scrollTop = area.scrollHeight;
                }
            }
            loadRooms();
        });

        init();
    </script>
</body>

</html>
