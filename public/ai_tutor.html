<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor IA - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #3b82f6;
            --secondary-hover: #2563eb;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --ai-bg: #e2e8f0;
            --user-bg: #eff6ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html,
        body {
            height: 100vh;
            overflow: hidden;
            background-color: var(--background);
            color: var(--text-main);
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 1. LAYOUT FIX: Left sidebar 300px */
        aside {
            width: 300px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .aside-top {
            padding: 1.5rem 1.5rem 1rem;
        }

        .aside-top h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: white;
        }

        .aside-middle {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.5rem 1rem;
        }

        .aside-middle::-webkit-scrollbar {
            width: 6px;
        }

        .aside-middle::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .section-title {
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .conv-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .conv-item {
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
        }

        .conv-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .conv-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 3px solid var(--secondary);
        }

        .conv-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            padding-right: 1.5rem;
        }

        .conv-title {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-date {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.35rem;
        }

        .delete-btn {
            opacity: 0;
            color: #fca5a5;
            transition: opacity 0.2s;
            padding: 0.25rem;
            position: absolute;
            right: 0.5rem;
            top: 0.5rem;
            font-size: 1.1rem;
            line-height: 1;
        }

        .conv-item:hover .delete-btn {
            opacity: 1;
        }

        .aside-bottom {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--primary);
        }

        .btn {
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-new {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--secondary);
            color: white;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .btn-new:hover {
            background: var(--secondary-hover);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        .user-role {
            font-size: 0.75rem;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.15);
            padding: 0.15rem 0.5rem;
            border-radius: 1rem;
            width: fit-content;
            margin-top: 0.25rem;
        }

        .logout-link {
            color: #fca5a5;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: opacity 0.2s;
        }

        .logout-link:hover {
            opacity: 0.8;
        }

        /* Right Chat Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--background);
            height: 100vh;
            position: relative;
        }

        .header {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 70px;
            padding: 0 1.5rem;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.2rem;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            flex-direction: column;
        }

        .message-content-wrapper {
            display: flex;
            gap: 1rem;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.user .message-content-wrapper {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            user-select: none;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: var(--ai-bg);
            border: 1px solid var(--border);
        }

        .avatar.user {
            background: var(--secondary);
            color: white;
            display: none;
            /* Can hide user avatar to look cleaner if desired, but kept for symmetry */
        }

        .bubble {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            word-wrap: break-word;
        }

        .ai .bubble {
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-top-left-radius: 0;
            color: var(--text-main);
        }

        .user .bubble {
            background: var(--secondary);
            color: white;
            border-top-right-radius: 0;
        }

        .msg-timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            padding: 0 0.25rem;
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .suggestions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            background: var(--background);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .suggestion-chip:hover {
            border-color: var(--secondary);
            color: var(--secondary);
            background: var(--user-bg);
        }

        .pdf-preview {
            display: none;
            font-size: 0.85rem;
            background: var(--user-bg);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #bfdbfe;
            color: var(--secondary);
            font-weight: 500;
            width: fit-content;
            align-items: center;
            gap: 0.5rem;
        }

        .pdf-preview .close-btn {
            cursor: pointer;
            color: #fca5a5;
            font-size: 1.1rem;
            line-height: 1;
        }

        .pdf-attached-badge {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0.5rem;
        }

        .action-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 1.25rem;
        }

        .action-btn:hover:not(:disabled) {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-input {
            flex: 1;
            padding: 0.5rem 0.5rem;
            border: none;
            background: transparent;
            font-size: 1rem;
            height: 40px;
            line-height: 24px;
            resize: none;
            overflow-y: auto;
        }

        .chat-input:focus {
            outline: none;
        }

        .send-btn {
            background: var(--secondary);
            color: white;
            width: 40px;
            height: 40px;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--secondary-hover);
            color: white;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
        }

        .download-pdf-btn {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 1rem;
            background: white;
            color: var(--text-main);
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .download-pdf-btn:hover {
            background: #f1f5f9;
        }

        /* Typing animation */
        .dot {
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        /* Scrollbar for chat messages */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
            border: 2px solid var(--background);
        }
    </style>

    <script src="/global.js"></script>
</head>

    <div class="app-container">
        <aside>

    <script>
        let userData = null;
        let currentConversationId = null;
        let messagesContext = [];
        let currentPdfBase64 = null;
        let currentPdfFileName = null;

        async function loadChatHistory() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/ai-tutor/history', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    messagesContext = [];
                    data.messages.forEach(msg => {
                        messagesContext.push({ role: msg.role, content: msg.content, timestamp: msg.created_at || new Date().toISOString() });
                    });
                    renderMessages();
                    console.log('Loaded', data.messages.length, 'messages from history');
                    return true;
                }
                return false;
            } catch (e) {
                console.error('History load error:', e);
                return false;
            }
        }

        async function init() {
            try {
                const res = await fetch('/auth/me');
                if (res.ok) {
                    userData = await res.json();
                    setupUserUI(userData);
                    await loadConversations();
                    const hasHistory = await loadChatHistory();
                    if (!hasHistory) {
                        startNewConversation();
                    }
                }
            } catch (err) { console.error(err); }

            const textarea = document.getElementById('messageInput');
            textarea.addEventListener('input', function () {
                this.style.height = '40px';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
            textarea.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        function setupUserUI(user) {
            document.getElementById('userNameDisplay').textContent = user.name || 'Usuario';

            if (user.role === 'student') {
                document.getElementById('userRoleDisplay').textContent = 'Estudiante';
            } else if (user.role === 'teacher') {
                document.getElementById('userRoleDisplay').textContent = 'Profesor';
                document.querySelector('.header-title').innerHTML = '🤖 Asistente IA';
            } else {
                document.getElementById('userRoleDisplay').textContent = 'Admin';
            }
        }

        function goBack() {
            if (!userData) return window.location.href = '/';
            if (userData.role === 'teacher') {
                window.location.href = '/teacher/dashboard';
            } else if (userData.role === 'student') {
                window.location.href = '/student-portal';
            } else {
                window.location.href = '/'; // admin or other
            }
        }

        function formatRelativeDate(dateString) {
            if (!dateString) return 'hace un momento';
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays === 0) {
                const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
                if (diffHours === 0) return 'hace un momento';
                return `hace ${diffHours} h`;
            }
            if (diffDays === 1) return 'ayer';
            return `hace ${diffDays} días`;
        }

        function formatTime(dateString) {
            if (!dateString) return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return new Date(dateString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        async function loadConversations() {
            const token = localStorage.getItem('token');
            const res = await fetch('/api/ai/conversations', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                const convs = await res.json();
                const list = document.getElementById('conversation-list');
                if (convs.length === 0) {
                    list.innerHTML = `<div style="padding:1rem 0; text-align:center; color:#64748b; font-size:0.85rem;">Sin conversaciones</div>`;
                    return;
                }
                list.innerHTML = convs.map(c => `
                    <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}" 
                         onclick="selectConversation(${c.id})" 
                         oncontextmenu="event.preventDefault(); togglePin(${c.id}, ${c.is_pinned === 1 || c.is_pinned === true})">
                        <div class="conv-content">
                            <div class="conv-title">${c.is_pinned ? '📌 ' : ''}${c.title}</div>
                            <div class="conv-date">${formatRelativeDate(c.updated_at || c.created_at)}</div>
                        </div>
                        <span class="delete-btn" onclick="event.stopPropagation(); deleteConversation(${c.id})">✕</span>
                    </div>
                `).join('');
            }
        }

        async function startNewConversation() {
            currentConversationId = null;
            messagesContext = [];
            document.getElementById('current-chat-title').textContent = 'Nueva sesión';
            document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'));

            const initialPrompt = userData?.role === 'teacher'
                ? '¡Hola! Soy tu asistente pedagógico inteligente de AcademiaPro. Puedo ayudarte a preparar clases, crear ejercicios o sugerir metodologías didácticas. ¿En qué te ayudo hoy?'
                : '¡Hola! Soy tu asistente educativo inteligente de AcademiaPro. Puedes hacerme preguntas sobre cualquier materia o subir un PDF usando el icono 📎 para que lo analice. ¿Qué estudiamos hoy?';

            messagesContext.push({ role: 'assistant', content: initialPrompt, timestamp: new Date().toISOString() });

            renderMessages();
            loadSuggestions(userData);
            clearPdfAttachment();
            document.getElementById('suggestionsBox').style.display = 'flex';
        }

        async function selectConversation(id) {
            currentConversationId = id;
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/ai/conversations/${id}/messages`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                const msgs = await res.json();

                const dbTitleRes = await fetch('/api/ai/conversations', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                let foundTitle = 'Chat cargado';
                if (dbTitleRes.ok) {
                    const convs = await dbTitleRes.json();
                    const cMatch = convs.find(c => c.id === id);
                    if (cMatch) foundTitle = cMatch.title;
                }
                document.getElementById('current-chat-title').textContent = foundTitle;

                messagesContext = msgs.map(m => {
                    let parsedContent = m.content;
                    try {
                        let parsed = JSON.parse(m.content);
                        if (Array.isArray(parsed)) parsedContent = parsed;
                    } catch (e) { }
                    return { role: m.role, content: parsedContent, timestamp: m.created_at };
                });

                document.getElementById('suggestionsBox').style.display = 'none';
                renderMessages();
                loadConversations();
                clearPdfAttachment();
            }
        }

        function renderMessages() {
            const list = document.getElementById('chatMessages');
            list.innerHTML = messagesContext.map((m, index) => {
                let actualText = m.content;
                let pdfBadge = '';

                if (Array.isArray(m.content)) {
                    const textItem = m.content.find(i => i.type === 'text');
                    const docItem = m.content.find(i => i.type === 'document');
                    if (textItem) actualText = textItem.text;
                    if (docItem) pdfBadge = `<div class="pdf-attached-badge">📎 Documento PDF enviado</div>`;
                }

                if (typeof actualText !== 'string') actualText = JSON.stringify(actualText);

                let formattedText = actualText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formattedText = formattedText.replace(/\n/g, '<br>');

                const sender = m.role === 'user' ? 'user' : 'ai';
                const avatar = m.role === 'user' ? '👤' : '🤖';

                let downloadPdfBtn = '';
                if (m.role === 'assistant' && index > 0) {
                    const prevMsg = messagesContext[index - 1];
                    let textCheck = typeof prevMsg?.content === 'string' ? prevMsg.content : (Array.isArray(prevMsg?.content) ? prevMsg.content.find(c => c.type === 'text')?.text || '' : '');
                    textCheck = textCheck.toLowerCase();
                    if (textCheck.includes('genera un pdf') || textCheck.includes('crear pdf') || textCheck.includes('hazme un pdf')) {
                        downloadPdfBtn = `<button class="download-pdf-btn" onclick="generatePdfAndDownload('${encodeURIComponent(actualText)}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Descargar como PDF
                        </button>`;
                    }
                }

                return `
                    <div class="message ${sender}">
                        <div class="message-content-wrapper">
                            <div class="avatar ${sender}">${avatar}</div>
                            <div style="display:flex; flex-direction:column; max-width:100%;">
                                <div class="bubble">
                                    ${pdfBadge}
                                    ${formattedText}
                                    ${downloadPdfBtn ? '<br>' + downloadPdfBtn : ''}
                                </div>
                                <div class="msg-timestamp" style="text-align: ${sender === 'user' ? 'right' : 'left'}">
                                    ${formatTime(m.timestamp)}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            setTimeout(() => {
                list.scrollTop = list.scrollHeight;
            }, 50);
        }

        let currentPdfFile = null;

        function handlePdfUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                showToast('El archivo PDF no puede exceder los 10MB.', 'error');
                return;
            }

            currentPdfFile = file;
            currentPdfFileName = file.name;

            document.getElementById('pdfAttachmentPreview').style.display = 'flex';
            document.getElementById('pdfAttachmentName').textContent = currentPdfFileName;
        }

        function clearPdfAttachment() {
            currentPdfFile = null;
            currentPdfBase64 = null; // kept for compatibility variable just in case
            currentPdfFileName = null;
            document.getElementById('pdfInput').value = '';
            document.getElementById('pdfAttachmentPreview').style.display = 'none';
        }

        async function togglePin(id, currentPinedState) {
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/ai/conversations/${id}/pin`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ is_pinned: !currentPinedState })
            });
            if (res.ok) {
                loadConversations();
            }
        }

        async function generatePdfAndDownload(encodedText) {
            const text = decodeURIComponent(encodedText);
            const res = await fetch('/api/ai-tutor/generate-pdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `Tutor_IA_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } else {
                showToast('No se pudo generar el PDF. Error en el servidor.', 'error');
            }
        }

        async function deleteConversation(id) {
            if (!confirm('¿Seguro que quieres borrar este historial?')) return;
            const token = localStorage.getItem('token');
            const res = await fetch(`/api/ai/conversations/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) {
                if (currentConversationId === id) startNewConversation();
                loadConversations();
            }
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'flex';
            document.getElementById('sendBtn').disabled = true;
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
            document.getElementById('sendBtn').disabled = false;
        }

        async function sendWithPDF(file, userMessage) {
            showTypingIndicator();
            try {
                const formData = new FormData();
                formData.append('pdf', file);
                
                const extractRes = await fetch('/api/ai-tutor/extract-pdf', {
                    method: 'POST',
                    body: formData
                });
                
                const extractData = await extractRes.json();
                
                if (!extractRes.ok) {
                    hideTypingIndicator();
                    messagesContext.push({ role: 'assistant', content: '❌ ' + (extractData.error || 'Error al leer el PDF'), timestamp: new Date().toISOString() });
                    renderMessages();
                    return;
                }
                
                const pdfContext = `El usuario ha compartido un PDF llamado "${file.name}" (${extractData.pages} páginas).\n\nContenido del PDF:\n${extractData.text}`;
                const fullMessage = userMessage 
                    ? `${pdfContext}\n\nPregunta del usuario: ${userMessage}`
                    : `${pdfContext}\n\nPor favor, resume el contenido de este documento.`;
                
                const displayMessage = `📄 ${file.name}${userMessage ? '\n' + userMessage : ''}`;
                
                await sendToGroq(fullMessage, displayMessage);
                
            } catch (err) {
                hideTypingIndicator();
                messagesContext.push({ role: 'assistant', content: '❌ Error al procesar el PDF. Inténtalo de nuevo.', timestamp: new Date().toISOString() });
                renderMessages();
                console.error('PDF error:', err);
            }
        }

        async function sendToGroq(apiMessage, displayMessage = null) {
            if (!displayMessage) displayMessage = apiMessage;

            messagesContext.push({ role: 'user', content: displayMessage, timestamp: new Date().toISOString() });
            renderMessages();

            showTypingIndicator();

            try {
                const token = localStorage.getItem('token');
                const apiPayload = messagesContext.map((m, index) => ({
                    role: m.role,
                    content: (index === messagesContext.length - 1 && m.role === 'user') ? apiMessage : m.content
                }));

                const res = await fetch('/api/ai-tutor/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ messages: apiPayload, conversationId: currentConversationId })
                });

                if (res.ok) {
                    const data = await res.json();
                    const aiContent = data.response;
                    if (data.conversationId) currentConversationId = data.conversationId;
                    messagesContext.push({ role: 'assistant', content: aiContent, timestamp: new Date().toISOString() });
                    renderMessages();
                    loadConversations();
                } else {
                    const errData = await res.json().catch(() => ({}));
                    console.error('Chat error:', res.status, errData);
                    const errorMsg = "❌ Error al procesar el mensaje. Inténtalo de nuevo.";
                    messagesContext.push({ role: 'assistant', content: errorMsg, timestamp: new Date().toISOString(), isError: true });
                    renderMessages();
                }
            } catch (err) {
                console.error(err);
                messagesContext.push({ role: 'assistant', content: "❌ Error grave de conexión. Verifica tu internet y vuelve a intentarlo.", timestamp: new Date().toISOString(), isError: true });
                renderMessages();
            } finally {
                hideTypingIndicator();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content && !currentPdfFile) return;

            const fileToPass = currentPdfFile;
            
            input.value = '';
            input.style.height = '40px';
            document.getElementById('suggestionsBox').style.display = 'none';

            clearPdfAttachment();

            if (fileToPass) {
                await sendWithPDF(fileToPass, content);
            } else {
                await sendToGroq(content);
            }
        }

        async function loadSuggestions(user) {
            const box = document.getElementById('suggestionsBox');
            let suggestions = [];
            if (user?.role === 'teacher') {
                suggestions = ["Ayúdame a planificar una clase", "Dame ideas para un examen", "¿Cómo motivo a mis alumnos?"];
            } else {
                suggestions = ["Explícame las células", "Ayuda con sintaxis", "¿Cómo resolver ecuaciones?"];
            }
            box.innerHTML = suggestions.map(s => `<button class="suggestion-chip" onclick="useSuggestion('${s}')">${s}</button>`).join('');
        }

        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
            document.getElementById('suggestionsBox').style.display = 'none';
        }

        window.addEventListener('resize', () => {
            const list = document.getElementById('chatMessages');
            if (list) list.scrollTop = list.scrollHeight;
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>

    <div class="mobile-nav-overlay" id="mobile-nav-overlay" onclick="closeMobileNav()"></div>
</body>
