<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pagos - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A56A0;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: #1e293b;
            color: #94a3b8;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            overflow-y: auto;
            overflow-x: hidden;
        }

        aside h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        .user-info {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }

        .user-info strong {
            display: block;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }

        .badge-student {
            background: #f59e0b;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        nav a.active {
            background: #3b82f6;
            color: white;
        }

        .btn-logout {
            color: #fca5a5;
            text-decoration: none;
            font-weight: 600;
            padding: 0.75rem 1rem;
            display: block;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        /* Stats Card */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-box h4 {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-box .value {
            font-size: 1.75rem;
            font-weight: 800;
        }

        /* Table Card */
        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-block;
        }

        .status-pagado {
            background: #dcfce7;
            color: #166534;
        }

        .status-pendiente {
            background: #fef3c7;
            color: #92400e;
        }

        .status-vencido {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            .stats-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="/glassmorphism.css">
    <script src="/global.js"></script>
</head>

<body>

<div class="loading-overlay" id="globalLoading">
  <svg xmlns="http://www.w3.org/2000/svg" height="200px" width="200px" viewBox="0 0 200 200" class="pencil">
  	<defs>
  		<clipPath id="pencil-eraser">
  			<rect height="30" width="30" ry="5" rx="5"></rect>
  		</clipPath>
  	</defs>
  	<circle transform="rotate(-113,100,100)" stroke-linecap="round" stroke-dashoffset="439.82" stroke-dasharray="439.82 439.82" stroke-width="2" stroke="currentColor" fill="none" r="70" class="pencil__stroke"></circle>
  	<g transform="translate(100,100)" class="pencil__rotate">
  		<g fill="none">
  			<circle transform="rotate(-90)" stroke-dashoffset="402" stroke-dasharray="402.12 402.12" stroke-width="30" stroke="hsl(223,90%,50%)" r="64" class="pencil__body1"></circle>
  			<circle transform="rotate(-90)" stroke-dashoffset="465" stroke-dasharray="464.96 464.96" stroke-width="10" stroke="hsl(223,90%,60%)" r="74" class="pencil__body2"></circle>
  			<circle transform="rotate(-90)" stroke-dashoffset="339" stroke-dasharray="339.29 339.29" stroke-width="10" stroke="hsl(223,90%,40%)" r="54" class="pencil__body3"></circle>
  		</g>
  		<g transform="rotate(-90) translate(49,0)" class="pencil__eraser">
  			<g class="pencil__eraser-skew">
  				<rect height="30" width="30" ry="5" rx="5" fill="hsl(223,90%,70%)"></rect>
  				<rect clip-path="url(#pencil-eraser)" height="30" width="5" fill="hsl(223,90%,60%)"></rect>
  				<rect height="20" width="30" fill="hsl(223,10%,90%)"></rect>
  				<rect height="20" width="15" fill="hsl(223,10%,70%)"></rect>
  				<rect height="20" width="5" fill="hsl(223,10%,80%)"></rect>
  				<rect height="2" width="30" y="6" fill="hsla(223,10%,10%,0.2)"></rect>
  				<rect height="2" width="30" y="13" fill="hsla(223,10%,10%,0.2)"></rect>
  			</g>
  		</g>
  		<g transform="rotate(-90) translate(49,-30)" class="pencil__point">
  			<polygon points="15 0,30 30,0 30" fill="hsl(33,90%,70%)"></polygon>
  			<polygon points="15 0,6 30,0 30" fill="hsl(33,90%,50%)"></polygon>
  			<polygon points="15 0,20 10,10 10" fill="hsl(223,10%,10%)"></polygon>
  		</g>
  	</g>
  </svg>
  <p id="loadingText">Cargando...</p>
</div>

    <!-- BG Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <aside>
        <h1>AcademiaPro</h1>
        <div class="user-info">
            <strong id="sidebar-name">Cargando...</strong>
            <span class="badge-student">ALUMNO</span>
            <div style="margin-top:0.5rem;font-size:0.8rem;color:#94a3b8;">
                Código: <b id="sidebar-code" style="color:white;">---</b>
            </div>
        </div>
        <nav id="mainNav">
            <a href="/student-portal">🏠 Mi Panel</a>
            <a href="/student-portal/calendar">📅 Mi Calendario</a>
            <a href="/student-portal/exams">📝 Mis Notas</a>
            <a href="/student-portal/payments">💳 Mis Pagos</a>
            <a href="/exam-simulator">📋 Simulacro</a>
            <a href="/ai-tutor">🤖 Tutor IA</a>
            <a href="/chat">💬 Chat</a>
        </nav>
        <div style="margin-top:auto;">
            <button class="Btn" onclick="window.location.href='/auth/logout'">
                <div class="sign">
                    <svg viewBox="0 0 512 512"><path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"></path></svg>
                </div>
                <div class="text">Logout</div>
            </button>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2>Mis Pagos</h2>
            <p style="color: var(--text-muted);">Historial de cuotas y pagos pendientes.</p>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <h4>Pagado este mes</h4>
                <div id="paid-this-month" class="value" style="color: var(--success)">0 €</div>
            </div>
            <div class="stat-box">
                <h4>Pendiente Total</h4>
                <div id="pending-total" class="value">0 €</div>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Concepto / Cantidad</th>
                        <th>Fecha de Vencimiento</th>
                        <th>Fecha de Pago</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="payments-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadPayments() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch('/api/student/portal-data', {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                const data = await res.json();
                const payments = data.payments;

                const now = new Date();
                const currentMonth = now.toISOString().slice(0, 7);
                const paidThisMonth = payments
                    .filter(p => p.status === 'pagado' && p.paid_date && p.paid_date.startsWith(currentMonth))
                    .reduce((acc, p) => acc + p.amount, 0);

                const pendingTotal = data.stats.pendingPayments;

                document.getElementById('paid-this-month').textContent = `${paidThisMonth} €`;
                document.getElementById('pending-total').textContent = `${pendingTotal} €`;
                if (pendingTotal > 0) document.getElementById('pending-total').style.color = 'var(--danger)';

                const tbody = document.getElementById('payments-table-body');
                if (payments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted)">No hay registros de pagos.</td></tr>';
                    return;
                }

                tbody.innerHTML = payments.map(p => {
                    const today = new Date().toISOString().split('T')[0];
                    let status = p.status;
                    if (status === 'pending' && p.due_date < today) status = 'vencido';

                    return `
                        <tr>
                            <td style="font-weight: 600">${p.amount} €</td>
                            <td style="color: var(--text-muted)">${new Date(p.due_date).toLocaleDateString('es-ES')}</td>
                            <td>${p.paid_date ? new Date(p.paid_date).toLocaleDateString('es-ES') : '-'}</td>
                            <td>
                                <span class="status-badge status-${status}">
                                    ${status.charAt(0).toUpperCase() + status.slice(1)}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
            }
        }

        async function initSidebar() {
            try {
                const res = await fetch('/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    document.getElementById('sidebar-name').textContent = user.name;
                    document.getElementById('sidebar-code').textContent = user.user_code || '---';
                }
            } catch (e) {
                console.error('Error initializing sidebar:', e);
            }
            const path = window.location.pathname;
            document.querySelectorAll('#mainNav a').forEach(a => {
                a.classList.toggle('active', a.getAttribute('href') === path);
            });
        }

        loadPayments();
        initSidebar();
    </script>
</body>

</html>
