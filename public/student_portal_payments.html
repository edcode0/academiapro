<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pagos - AcademiaPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A56A0;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        aside h1 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
        }

        nav {
            flex: 1;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        nav a:hover,
        nav a.active {
            background: #eff6ff;
            color: var(--primary);
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h2 {
            font-size: 1.875rem;
            font-weight: 700;
        }

        /* Stats Card */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-box h4 {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-box .value {
            font-size: 1.75rem;
            font-weight: 800;
        }

        /* Table Card */
        .card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-block;
        }

        .status-pagado {
            background: #dcfce7;
            color: #166534;
        }

        .status-pendiente {
            background: #fef3c7;
            color: #92400e;
        }

        .status-vencido {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            aside {
                display: none;
            }

            main {
                margin-left: 0;
                padding: 1.5rem;
            }

            .stats-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <aside>
        <h1>AcademiaPro</h1>
        <nav id="mainNav">
            <a href="/student-portal">🏠 Mi Panel</a>
            <a href="/student-portal/exams">📝 Mis Notas</a>
            <a href="/student-portal/calendar">📅 Mi Calendario</a>
            <a href="/student-portal/payments" class="active">💳 Mis Pagos</a>
            <a href="/chat">💬 Chat</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="/auth/logout"
                style="color: var(--danger); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
                🚪 Cerrar Sesión
            </a>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2>Mis Pagos</h2>
            <p style="color: var(--text-muted);">Historial de cuotas y pagos pendientes.</p>
        </div>

        <div class="stats-summary">
            <div class="stat-box">
                <h4>Pagado este mes</h4>
                <div id="paid-this-month" class="value" style="color: var(--success)">0 €</div>
            </div>
            <div class="stat-box">
                <h4>Pendiente Total</h4>
                <div id="pending-total" class="value">0 €</div>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Concepto / Cantidad</th>
                        <th>Fecha de Vencimiento</th>
                        <th>Fecha de Pago</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="payments-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function loadPayments() {
            try {
                const res = await fetch('/api/student/portal-data');
                const data = await res.json();
                const payments = data.payments;

                const now = new Date();
                const currentMonth = now.toISOString().slice(0, 7);
                const paidThisMonth = payments
                    .filter(p => p.status === 'pagado' && p.paid_date && p.paid_date.startsWith(currentMonth))
                    .reduce((acc, p) => acc + p.amount, 0);

                const pendingTotal = data.stats.pendingPayments;

                document.getElementById('paid-this-month').textContent = `${paidThisMonth} €`;
                document.getElementById('pending-total').textContent = `${pendingTotal} €`;
                if (pendingTotal > 0) document.getElementById('pending-total').style.color = 'var(--danger)';

                const tbody = document.getElementById('payments-table-body');
                if (payments.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted)">No hay registros de pagos.</td></tr>';
                    return;
                }

                tbody.innerHTML = payments.map(p => {
                    const today = new Date().toISOString().split('T')[0];
                    let status = p.status;
                    if (status === 'pending' && p.due_date < today) status = 'vencido';

                    return `
                        <tr>
                            <td style="font-weight: 600">${p.amount} €</td>
                            <td style="color: var(--text-muted)">${new Date(p.due_date).toLocaleDateString('es-ES')}</td>
                            <td>${p.paid_date ? new Date(p.paid_date).toLocaleDateString('es-ES') : '-'}</td>
                            <td>
                                <span class="status-badge status-${status}">
                                    ${status.charAt(0).toUpperCase() + status.slice(1)}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
            }
        }

        loadPayments();
    </script>
</body>

</html>
